services:
  - type: web
    name: ssg-trading-bot
    env: python
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PORT
        value: 5000
    healthCheckPath: /health
    healthCheckInterval: 30
    maxShutdownDelay: 30
    preDeployCommand: mkdir -p reports data models
